<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>d'Alba Vita Toning Serum Toner</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#faf7f4;
color:#1d1d1d;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
}

/* HEADER */

header{
background:white;
border-bottom:1px solid #eee;
position:sticky;
top:0;
z-index:100;
}

.nav{
display:flex;
align-items:center;
justify-content:space-between;
height:70px;
}

.logo{
font-family:'Playfair Display',serif;
font-size:26px;
font-weight:600;
letter-spacing:1px;
}

.nav-links{
display:flex;
gap:30px;
font-size:14px;
color:#666;
}

.nav-links a{
text-decoration:none;
color:#666;
}

.buy-btn{
background:#111;
color:white;
padding:10px 20px;
border-radius:30px;
font-size:14px;
text-decoration:none;
}

/* HERO */

.hero{
padding:80px 0;
}

.hero-grid{
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
gap:60px;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:56px;
line-height:1.1;
margin-bottom:20px;
}

.hero p{
font-size:18px;
color:#555;
margin-bottom:30px;
}

.hero-buttons{
display:flex;
gap:20px;
}

.primary-btn{
background:#111;
color:white;
padding:16px 28px;
border-radius:40px;
font-weight:500;
text-decoration:none;
}

.secondary-btn{
border:1px solid #ddd;
padding:16px 28px;
border-radius:40px;
text-decoration:none;
color:#333;
}

.hero-image{
text-align:center;
}

.hero-image img{
max-width:420px;
width:100%;
border-radius:20px;
}

/* TRUST BADGES */

.trust{
margin-top:30px;
display:flex;
gap:25px;
font-size:13px;
color:#777;
}

.trust span{
display:flex;
align-items:center;
gap:6px;
}

/* MOBILE */

@media(max-width:900px){

.hero-grid{
grid-template-columns:1fr;
text-align:center;
}

.hero-buttons{
justify-content:center;
}

.hero h1{
font-size:40px;
}

.nav-links{
display:none;
}

}

</style>

</head>

<body>

<header>

<div class="container nav">

<div class="logo">d'Alba</div>

<div class="nav-links">
<a href="#">Benefits</a>
<a href="#">Ingredients</a>
<a href="#">Reviews</a>
</div>

<a href="#buy" class="buy-btn">Buy Now</a>

</div>

</header>


<section class="hero">

<div class="container hero-grid">

<div>

<h1>Vitamin C Glow Serum Toner</h1>

<p>
A lightweight Korean serum toner powered by Vitamin C to brighten, hydrate and refine skin tone for a radiant healthy glow.
</p>

<div class="hero-buttons">

<a href="#buy" class="primary-btn">Shop Now</a>

<a href="#video" class="secondary-btn">Watch Demo</a>

</div>

<div class="trust">

<span>✓ Dermatologist tested</span>

<span>✓ 30-day glow guarantee</span>

<span>✓ Free shipping</span>

</div>

</div>

<div class="hero-image">

<img src="images/1- Hero Product Image.png" alt="d'Alba Vita Toning Serum Toner">

</div>

</div>

</section>

</body>
</html>
