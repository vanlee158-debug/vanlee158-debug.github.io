<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Product Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      background: white;
      border-radius: 14px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .image-section {
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    .image-section img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
    }

    .info-section {
      padding: 40px;
    }

    .badge {
      display: inline-block;
      background: #111;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      margin-bottom: 15px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    .price {
      font-size: 28px;
      font-weight: bold;
      color: #1e7a45;
      margin: 20px 0;
    }

    p {
      line-height: 1.6;
      color: #555;
    }

    ul {
      padding-left: 18px;
      color: #444;
    }

    button {
      margin-top: 20px;
      background: #111;
      color: white;
      border: none;
      padding: 14px 22px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
        margin: 20px;
      }

      .info-section {
        padding: 25px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="image-section">
      <img src="images/product.jpg" alt="Product Image">
    </div>

    <div class="info-section">
      <span class="badge">Best Seller</span>
      <h1>Glow Skin Serum</h1>
      <p class="price">$19.99</p>
      <p>
        A simple and clean product page for your website. You can replace this text
        with your own product description.
      </p>

      <ul>
        <li>Brightens the skin</li>
        <li>Lightweight formula</li>
        <li>Easy daily use</li>
      </ul>

      <button onclick="alert('Product added to cart!')">Add to Cart</button>
    </div>
  </div>
</body>
</html>
